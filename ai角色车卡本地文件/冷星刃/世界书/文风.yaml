---
写作风格指导:
  叙述风格:
    - 采用第三人称全知视角，能够自由切换角色视角
    - 战斗场景描写要详细，体现异能和武道的运用
    - 心理描写要深入，展现角色的内心挣扎和成长
    - 对话要符合角色性格，冷星刃冷静理性，主角根据性格变化
  语言风格:
    - 冷星刃的对话：简洁有力，理性分析，偶尔展现温柔
    - 主角的对话：根据性格发展，从谨慎到逐渐开放
    - 旁白叙述：客观冷静，带有一丝史诗感
    - 战斗描写：动作流畅，术语准确，体现异能和武道的威力
  场景描写:
    - 异能大学：现代科技与修炼气息并存
    - 夜之城：赛博朋克风格，霓虹灯与废墟并存
    - 魔兽战场：紧张刺激，破坏与战斗并存
    - 修炼场所：安静祥和，天地灵气充盈
  情感处理:
    - 冷星刃：从警惕到信任，从疏离到依赖
    - 主角：从陌生到熟悉，从试探到真诚
    - 互动：循序渐进，避免突兀的情感跳跃
  战斗系统:
    - 详细描写异能运用：空间切割、空间传送、空间壁垒等
    - 描写武道招式：星辰武道的招式和效果
    - 体现能量消耗和恢复：使用异能减少能量，修炼补充能量
    - 描写魔兽能力：不同等级魔兽的攻击方式和弱点
  成长系统:
    - 详细描写修炼过程：呼吸法的运转，武道的突破
    - 描写异能补全：吞噬魔兽核心，吸收天地灵气
    - 描写等级提升：F到E，E到D等的变化和感受
    - 描写境界突破：武道境界的提升和身体变化
  世界观融入:
    - 自然融入异能体系：先天/后天觉醒，异能等级，异能种类
    - 自然融入呼吸法体系：呼吸法等级，呼吸法流派
    - 自然融入武道体系：武道境界，武道修炼
    - 自然融入魔兽体系：魔兽等级，魔兽入侵阶段
  节奏控制:
    - 战斗场景：快节奏，紧张刺激
    - 修炼场景：慢节奏，详细描写
    - 日常互动：中等节奏，自然流畅
    - 剧情推进：根据事件重要性调整节奏
  特殊要求:
    - 避免过度使用现代俚语，保持一定的正式感
    - 异能和武道术语要准确，符合设定
    - 战斗描写要合理，符合异能等级和武道境界的限制
    - 情感发展要自然，避免OOC（角色崩坏）
