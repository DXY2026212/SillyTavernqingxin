---
变量更新规则:
  世界:
    当前时间:
      format: YYYY-MM-DD HH:MM
      check:
        - 每次对话、移动、战斗或修炼后推进时间
        - 战斗轮次通常消耗几分钟到几小时
        - 修炼可能消耗数天到数月
    当前地点:
      check:
        - 角色在故事中明确从一个地方移动到另一个地方时更新
        - 描述应包含城市、区域、具体位置
    当前天气:
      check:
        - 天气在故事中发生变化时更新
        - 如开始下雨、天气转晴等
    魔兽入侵阶段:
      type: string
      check:
        - 根据剧情推进更新入侵阶段
        - 阶段：第一波F-E级魔兽潮、第二波D-B级魔兽潮、第三波A级魔兽军团、第四波S级魔兽王、第五波SS级及以上魔兽神明
    入侵倒计时:
      type: number
      check:
        - 每天减少1
        - 重大剧情事件可能加速或延缓倒计时
  冷星刃:
    异能信息:
      异能种类:
        type: string
        check:
          - 仅在觉醒新异能或异能进化时更新
      异能名称:
        type: string
        check:
          - 异能觉醒时命名，异能进化时可能更新
      异能等级:
        type: string
        check:
          - 通过补全能量提升等级
          - 等级：F、E、D、C、B、A、S、SS、SSS、神明
      异能潜力:
        type: string
        check:
          - 觉醒时确定，通常不变
          - 描述异能的真实潜力等级
      能量值:
        type: number
        check:
          - 使用异能时减少
          - 通过呼吸法修炼、吸收天地灵气、吞噬魔兽核心时增加
          - 不能超过能量上限
      能量上限:
        type: number
        check:
          - 根据异能等级和呼吸法等级计算
          - 公式：能量上限 = (异能等级数值 + 呼吸法等级数值) × 10
    呼吸法信息:
      呼吸法名称:
        type: string
        check:
          - 获得新呼吸法秘籍时更新
      呼吸法等级:
        type: string
        check:
          - 通过修炼提升等级
          - 等级：F、E、D、C、B、A、S、SS、SSS、神明
      呼吸法流派:
        type: string
        check:
          - 获得新呼吸法时更新
          - 流派：道家、佛家、墨家、阴阳家、儒家、法家、兵家等
    武道信息:
      武道境界:
        type: string
        check:
          - 通过修炼提升境界
          - 境界：初窥门径、登堂入室、小成、大成、炉火纯青、出神入化、登峰造极、超凡入圣、圣境、宗师、大宗师、武圣、武神、武尊、武皇、武道神明
      武道名称:
        type: string
        check:
          - 获得新武道秘籍时更新
      修炼进度:
        type: number
        check:
          - 通过修炼增加进度
          - 进度达到100时突破至下一境界
    状态信息:
      好感度:
        type: number
        range: -100~100
        check:
          - <user>帮助冷星刃时增加（+1~+5）
          - <user>伤害冷星刃时减少（-1~-5）
          - <user>表现出真诚理解时增加（+3~+8）
          - <user>说教或强行干涉时减少（-3~-8）
      信任度:
        type: number
        range: 0~100
        check:
          - 共同战斗经历后增加（+5~+15）
          - <user>履行承诺时增加（+5~+10）
          - <user>背叛或欺骗时大幅减少（-20~-50）
          - 时间积累自然增长（+1~+3/天）
      当前心情:
        type: string
        check:
          - 根据互动和事件实时更新
          - 可能值：平静、兴奋、焦虑、悲伤、愤怒、恐惧、期待等
      当前状态:
        type: string
        check:
          - 受伤时更新为受伤状态
          - 中毒时更新为中毒状态
          - 疲劳时更新为疲劳状态
          - 恢复后更新为健康
      体力值:
        type: number
        range: 0~100
        check:
          - 战斗、修炼、使用异能时减少
          - 休息、进食、治疗时增加
          - 低于20时触发疲劳状态
      精神值:
        type: number
        range: 0~100
        check:
          - 精神冲击、过度使用异能时减少
          - 休息、冥想、治疗时增加
          - 低于20时触发精神不稳定状态
    近期目标:
      type: |-
        {
          [目标名: string]: string;
        }
      check:
        - 产生新目标时添加
        - 完成目标后移除
        - 最多保持5-8项活跃目标
    装备:
      上装:
        type: string
        check:
          - 换装、衣物损坏时更新
          - 描述需包含颜色、材质、款式
      下装:
        type: string
        check:
          - 换装、衣物损坏时更新
          - 描述需包含颜色、材质、款式
      内衣:
        type: string
        check:
          - 换装时更新
      鞋子:
        type: string
        check:
          - 换装、鞋子损坏时更新
      饰品:
        type: string
        check:
          - 获得或失去饰品时更新
    物品栏:
      type: |-
        {
          [物品名: string]: number | string;
        }
      check:
        - 获得物品时添加
        - 消耗物品时减少数量
        - 数量归零后移除
  主角:
    异能信息:
      异能种类:
        type: string
        check:
          - 主角觉醒异能时更新
      异能名称:
        type: string
        check:
          - 主角觉醒异能时命名
      异能等级:
        type: string
        check:
          - 主角异能等级提升时更新
      能量值:
        type: number
        check:
          - 主角使用异能时减少
          - 主角修炼时增加
      能量上限:
        type: number
        check:
          - 根据主角异能等级和呼吸法等级计算
    呼吸法信息:
      呼吸法名称:
        type: string
        check:
          - 主角获得呼吸法时更新
      呼吸法等级:
        type: string
        check:
          - 主角呼吸法等级提升时更新
      呼吸法流派:
        type: string
        check:
          - 主角获得新流派呼吸法时更新
    武道信息:
      武道境界:
        type: string
        check:
          - 主角武道境界提升时更新
      武道名称:
        type: string
        check:
          - 主角获得新武道时更新
      修炼进度:
        type: number
        check:
          - 主角修炼武道时增加进度
    状态信息:
      好感度:
        type: number
        range: -100~100
        check:
          - 冷星刃帮助主角时增加（+1~+5）
          - 冷星刃伤害主角时减少（-1~-5）
      信任度:
        type: number
        range: 0~100
        check:
          - 共同经历增加（+1~+5）
          - 背叛或欺骗减少（-10~-30）
      当前心情:
        type: string
        check:
          - 根据互动实时更新
      当前状态:
        type: string
        check:
          - 主角状态变化时更新
      体力值:
        type: number
        range: 0~100
        check:
          - 主角体力变化时更新
      精神值:
        type: number
        range: 0~100
        check:
          - 主角精神值变化时更新
    物品栏:
      type: |-
        {
          [物品名: string]: number | string;
        }
      check:
        - 主角获得物品时添加
        - 主角消耗物品时减少数量
