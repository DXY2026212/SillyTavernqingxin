<head>
    <style>
        :root {
            --theme-primary: #667eea;
            --theme-secondary: #764ba2;
            --theme-accent: #f093fb;
            --text-main: #e0e0e0;
            --text-sub: #a0aec0;
            --glass-bg: rgba(255, 255, 255, 0.94);
            --box-bg: rgba(0, 0, 0, 0.3);
            --box-border: rgba(255, 255, 255, 0.1);
            --border-highlight: rgba(102, 126, 234, 0.3);
            --bar-favor: #fab1a0;
            --bar-health: #81ecec;
            --bar-energy: #667eea;
            --bar-demon: #ff7675;
            --width-max: 900px;
            --font-ancient: "Noto Sans SC", "Microsoft YaHei", sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-ancient);
            background: transparent;
            color: var(--text-main);
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .status-card {
            width: 100%;
            max-width: var(--width-max);
            position: relative;
            border-radius: 16px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            box-shadow: 0 10px 40px rgba(31, 38, 135, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.6);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(2px);
            z-index: 0;
        }

        .card-content {
            position: relative;
            z-index: 1;
            padding: 20px;
        }

        .card-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-highlight);
        }

        .card-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--theme-primary);
            text-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
            margin-bottom: 5px;
        }

        .card-subtitle {
            font-size: 0.9rem;
            color: var(--text-sub);
            font-style: italic;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--theme-secondary);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--box-border);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }

        .info-item {
            background: var(--box-bg);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--box-border);
        }

        .info-label {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .progress-container {
            height: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.8rem;
            color: white;
            font-weight: bold;
            text-shadow: 0 0 2px rgba(0, 0, 0, 0.5);
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .status-item {
            background: var(--box-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--box-border);
        }

        .status-label {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-bottom: 8px;
        }

        .status-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .energy-section {
            background: rgba(102, 126, 234, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .energy-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .energy-label {
            font-size: 1rem;
            color: var(--theme-primary);
        }

        .energy-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-main);
        }

        .world-section {
            background: rgba(220, 38, 38, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .world-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .world-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--box-bg);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--box-border);
        }

        .world-icon {
            font-size: 1.5rem;
        }

        .world-value {
            font-size: 1rem;
            color: var(--text-main);
        }

        .invasion-section {
            background: rgba(220, 38, 38, 0.2);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .invasion-title {
            font-size: 1.1rem;
            color: #ff6b6b;
            margin-bottom: 10px;
        }

        .invasion-stage {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .countdown-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .countdown-label {
            font-size: 0.9rem;
            color: var(--text-sub);
        }

        .countdown-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff6b6b;
        }

        .ability-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            color: white;
            display: inline-block;
        }

        @media (max-width: 768px) {
            .info-grid,
            .status-grid,
            .world-info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="status-card">
        <div class="card-overlay"></div>
        <div class="card-content">
            <div class="card-header">
                <div class="card-title">🌟 冷星刃状态栏</div>
                <div class="card-subtitle">异能觉醒与魔兽入侵世界</div>
            </div>

            <div class="section">
                <div class="section-title">🌟 冷星刃</div>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">异能种类</div>
                        <div class="info-value" id="leng-xingren-ability-type">空间类</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">异能名称</div>
                        <div class="info-value" id="leng-xingren-ability-name">星刃空间</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">异能等级</div>
                        <div class="info-value" id="leng-xingren-ability-level">F级</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">异能潜力</div>
                        <div class="info-value" id="leng-xingren-ability-potential">神明级</div>
                    </div>
                </div>

                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">呼吸法</div>
                        <div class="info-value" id="leng-xingren-breathing-name">基础空间呼吸法</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">呼吸法等级</div>
                        <div class="info-value" id="leng-xingren-breathing-level">F级</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">流派</div>
                        <div class="info-value" id="leng-xingren-breathing-school">道家</div>
                    </div>
                </div>

                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">武道境界</div>
                        <div class="info-value" id="leng-xingren-martial-realm">初窥门径</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">修炼进度</div>
                        <div class="progress-container">
                            <div class="progress-bar" id="leng-xingren-cultivation-progress" style="width: 5%; background: var(--theme-primary);"></div>
                            <div class="progress-text">5%</div>
                        </div>
                    </div>
                </div>

                <div class="status-grid">
                    <div class="status-item">
                        <div class="status-label">❤️ 好感度</div>
                        <div class="status-value" id="leng-xingren-affection">0</div>
                        <div class="progress-container">
                            <div class="progress-bar" id="leng-xingren-affection-bar" style="width: 50%; background: var(--bar-favor);"></div>
                        </div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">🤝 信任度</div>
                        <div class="status-value" id="leng-xingren-trust">0</div>
                        <div class="progress-container">
                            <div class="progress-bar" id="leng-xingren-trust-bar" style="width: 0%; background: var(--theme-secondary);"></div>
                        </div>
                    </div>
                </div>

                <div class="status-grid">
                    <div class="status-item">
                        <div class="status-label">😊 心情</div>
                        <div class="status-value" id="leng-xingren-mood">平静</div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">💪 状态</div>
                        <div class="status-value" id="leng-xingren-status">健康</div>
                    </div>
                </div>

                <div class="status-grid">
                    <div class="status-item">
                        <div class="status-label">⚡ 体力</div>
                        <div class="status-value" id="leng-xingren-stamina">100/100</div>
                        <div class="progress-container">
                            <div class="progress-bar" id="leng-xingren-stamina-bar" style="width: 100%; background: var(--bar-health);"></div>
                        </div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">🧠 精神</div>
                        <div class="status-value" id="leng-xingren-mental">100/100</div>
                        <div class="progress-container">
                            <div class="progress-bar" id="leng-xingren-mental-bar" style="width: 100%; background: var(--bar-health);"></div>
                        </div>
                    </div>
                </div>

                <div class="energy-section">
                    <div class="energy-item">
                        <div class="energy-label">⚡ 能量</div>
                        <div class="energy-value" id="leng-xingren-energy">10/100</div>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar" id="leng-xingren-energy-bar" style="width: 10%; background: var(--bar-energy);"></div>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">🌍 世界信息</div>
                <div class="world-info-grid">
                    <div class="world-item">
                        <div class="world-icon">⏰</div>
                        <div class="world-value" id="world-time">2075-07-16 22:30</div>
                    </div>
                    <div class="world-item">
                        <div class="world-icon">📍</div>
                        <div class="world-value" id="world-location">夜之城 沃森区 All Foods工厂</div>
                    </div>
                    <div class="world-item">
                        <div class="world-icon">🌤️</div>
                        <div class="world-value" id="world-weather">阴沉小雨</div>
                    </div>
                </div>

                <div class="invasion-section">
                    <div class="invasion-title">⚔️ 魔兽入侵</div>
                    <div class="invasion-stage" id="world-invasion-stage">第一波F-E级魔兽潮</div>
                    <div class="countdown-section">
                        <div class="countdown-label">倒计时</div>
                        <div class="countdown-value" id="world-countdown">1095 天</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
